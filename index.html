<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin of RDN (Rongpur Daily Needs)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="loginBox">
    <h1>Rongpur Daily Needs</h1>
    <h2>Admin Login</h2>
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="checkPassword()">Login</button>
  </div>
  
  <div id="adminContent">
  	
  	<!-- Your RDNAdmin HTML here -->
    <div id="addDialogue">
      <div class="product-form">
        <span class="close" onclick="closePopup()">&times;</span>
        <h2 id="dialogueTitle">Enter Product</h2>
        <input id="pname" placeholder="Product name"><br><br>
        <input id="pprice" type="number" placeholder="Price"><br><br>
        <input id="punit" placeholder="Unit"><br><br>
        <input id="ptype" placeholder="Type"><br><br>
        <input id="pimgurl" type="url" placeholder="Image URL"><br><br>
        <button id="psave" onclick="save(this)">Save Product</button>
      </div>
    </div>
    
    <div class="product-list-header">
      <h2>Products List</h2>
      <button onclick="openPopup(this)">➕ Add</button>
    </div>
    
    <!-- Products -->
    <section id="products">
    	<div id="loader" class="loader"></div>
    </section>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
  </div>
</body>
</html>
